name: Terraform Destroy

on:
    workflow_dispatch:
        inputs:
            confirm:
                description: 'Tape "destroy" pour confirmer la destruction de l’infra'
                required: true
                type: string

permissions:
    contents: read
    id-token: write

jobs:
    destroy:
        name: "Terraform Destroy"
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: starter/terraform
        env:
            TF_VAR_owner: ${{ vars.TF_VAR_OWNER }}
            TF_VAR_resource_group_name: ${{ vars.TF_VAR_RESOURCE_GROUP_NAME }}
            TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
            TF_VAR_plan_name: ${{ vars.TF_VAR_PLAN_NAME }}
        steps:
            - name: Vérifie la confirmation
              if: github.event.inputs.confirm != 'destroy'
              run: |
                  echo "Confirmation incorrecte. Tape exactement 'destroy' pour continuer."
                  exit 1

            - name: Checkout
              uses: actions/checkout@v4

            - name: Login Azure
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v4

            - name: Terraform Init
              run: terraform init -backend-config="resource_group_name=rg-malik-cherfi" -backend-config="storage_account_name=stmalikcherfiterraform" -backend-config="container_name=tfstate" -backend-config="key=malik.terraform.tfstate"

            - name: Terraform Destroy
              run: terraform destroy -auto-approve
